<body>
    <header>
      <h1>Roman Numeral Calculator</h1>
    </header>

    <div id="general_container">
      <div id="cal_container" class="cal_container">
        <input type="text" id="display" class="display" disabled>
        <div class="CE_Del_btn">
          <button id="btnclear">CE</button>
          <button id="delBtn">DEL</button>
        </div>

        <div id="btnContainer" class="btnContainer">
          <button class="btns">1</button>
          <button class="btns">2</button>
          <button class="btns">3</button>
          <button class="btns">4</button>
          <button class="btns">5</button>
          <button class="btns">6</button>
          <button class="btns">7</button>
          <button class="btns">8</button>
          <button class="btns">9</button>
          <button class="btns">+</button>
          <button class="btns">0</button>
          <button class="btns">/</button>
          <button class="btns">*</button>
          <button class="btns">-</button>
          <button class="btns">.</button>
        </div>
        <div class="equal_roman_btn">
          <button class="btns" id="btn=">=</button>
          <button class="btns" id="convertRoman">RN</button>
        </div>


      </div>
    </div>
